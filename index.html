  { term: "Assertion", def: "Verificación explícita en un test que comprueba si una condición es verdadera. Si falla, el test falla. Ejemplos: expect(status).toBe(200), assert title == 'Home', cy.get('#error').should('be.visible'). Sin assertions, un test no prueba nada." },
  { term: "Selector CSS/XPath", def: "Forma de identificar un elemento en el DOM para interactuar con él. CSS: '#login-btn', '.submit-button'. XPath: '//button[@data-testid=\"submit\"]'. Los selectores por data-testid son más estables que los basados en clases de estilo." },
  { term: "CI/CD", def: "Continuous Integration / Continuous Delivery. CI: práctica de integrar cambios frecuentemente y ejecutar tests automáticamente. CD: desplegar automáticamente a ambientes. Para QA, CI es donde viven y corren los tests automatizados en cada cambio de código." },
  { term: "Mock", def: "Objeto que simula el comportamiento de una dependencia real (API, base de datos) en un test. Permite testear un componente aisladamente sin depender de servicios externos. Los mocks también pueden verificar que se llamaron con los parámetros correctos." },
  { term: "Stub", def: "Versión simplificada de una dependencia que retorna respuestas predefinidas. A diferencia del Mock, el Stub no verifica comportamiento, solo reemplaza la respuesta. Útil para simular APIs lentas, caídas o respuestas de error específicas." },
  { term: "Fixture", def: "Datos de prueba predefinidos y reutilizables. En Cypress/Playwright: archivos JSON en carpeta fixtures/. Permiten separar los datos de la lógica del test y reutilizarlos en múltiples tests sin hardcodear valores." },
  { term: "Flaky Test", def: "Test que falla intermitentemente sin cambios en el código o la aplicación. Son el mayor problema en automatización porque erosionan la confianza del equipo. Causas: race conditions, dependencias externas, datos compartidos entre tests, waits fijos." },
  { term: "Headless Browser", def: "Browser que corre sin interfaz gráfica (GUI). Los tests corren más rápido y se pueden ejecutar en servidores sin pantalla (como los de CI/CD). Playwright y Puppeteer corren headless por defecto en CI. Puedes cambiar a modo visible para debugging." },
  { term: "Test Runner", def: "Herramienta que ejecuta los tests y reporta los resultados. Ejemplos: Jest (JS), pytest (Python), TestNG (Java). El test runner maneja: descubrimiento de tests, ejecución, timeouts, y generación de reportes básicos." },
  { term: "Locator", def: "En Playwright, un locator es una representación lazy de un elemento que se resuelve en tiempo de ejecución. page.getByRole('button', {name: 'Submit'}). Más robusto que los selectores estáticos porque incluye auto-waits y reintentos automáticos." },
  { term: "Smoke Test", def: "Conjunto mínimo de tests que verifican que la funcionalidad más crítica del sistema funciona básicamente. Corren rápido (5-10 min) después de cada deploy para confirmar que 'no hay humo' antes de tests más profundos." },
  { term: "Regression Test", def: "Tests que verifican que cambios nuevos no rompieron funcionalidad existente. La suite de regresión es el corazón de la automatización: crece con cada bug corregido para que no vuelva a ocurrir." },
  { term: "Test Data Management", def: "Estrategia para manejar los datos que usan los tests. Opciones: fixtures (datos estáticos), factories (datos generados dinámicamente), base de datos de test, datos seedeados. Los tests deben ser independientes y no compartir datos mutables." },
];

function RoadmapView({ completed, onToggle }) {
  const [expanded, setExpanded] = useState(null);
  const [expandedTheory, setExpandedTheory] = useState(null);
  return (
    <div className="space-y-3 max-w-3xl mx-auto">
      <div className="mb-6">
        <h2 style={{ fontFamily: "var(--font-display)", fontSize: "1.4rem", fontWeight: 700, color: "#fff", marginBottom: 4 }}>🗺️ Roadmap de Aprendizaje</h2>
        <p style={{ color: "#94a3b8", fontSize: "0.85rem" }}>Tu hoja de ruta completa: QA Funcional → QA Automatizador</p>
      </div>
      {ROADMAP_STAGES.map((stage, i) => {
        const isOpen = expanded === stage.id;
        const isDone = completed[stage.id];
        return (
          <div key={stage.id} className="relative">
            {i < ROADMAP_STAGES.length - 1 && (
              <div style={{ position: "absolute", left: 20, top: "100%", width: 2, height: 12, background: isDone ? "#10b981" : "#1e293b", zIndex: 1 }} />
            )}
            <div style={{ borderRadius: 12, border: `1px solid ${isDone ? "#065f4644" : "#1e293b"}`, background: isDone ? "rgba(16,185,129,0.05)" : "rgba(15,23,42,0.6)", overflow: "hidden", transition: "all 0.2s" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", cursor: "pointer" }} onClick={() => setExpanded(isOpen ? null : stage.id)}>
                <div style={{ width: 40, height: 40, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.25rem", flexShrink: 0, background: `${stage.color}18`, border: `1px solid ${stage.color}33` }}>{stage.icon}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                    <span style={{ fontWeight: 600, color: "#f1f5f9", fontSize: "0.9rem" }}>{stage.title}</span>
                    <span style={{ fontSize: "0.7rem", padding: "2px 8px", borderRadius: 999, background: "rgba(139,92,246,0.15)", color: "#a78bfa", border: "1px solid rgba(139,92,246,0.3)", fontFamily: "var(--font-mono)" }}>{stage.duration}</span>
                    {isDone && <span style={{ fontSize: "0.7rem", padding: "2px 8px", borderRadius: 999, background: "rgba(16,185,129,0.15)", color: "#6ee7b7", border: "1px solid rgba(16,185,129,0.3)" }}>✓ Completado</span>}
                  </div>
                  <p style={{ color: "#64748b", fontSize: "0.78rem", marginTop: 2 }}>{stage.subtitle}</p>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <button onClick={e => { e.stopPropagation(); onToggle(stage.id); }}
                    style={{ width: 26, height: 26, borderRadius: "50%", border: `2px solid ${isDone ? "#10b981" : "#475569"}`, background: isDone ? "#10b981" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", transition: "all 0.2s" }}>
                    {isDone && <Check size={12} color="#fff" />}
                  </button>
                  {isOpen ? <ChevronDown size={15} color="#64748b" /> : <ChevronRight size={15} color="#64748b" />}
                </div>
              </div>
              {isOpen && (
                <div style={{ padding: "0 16px 16px", borderTop: "1px solid #1e293b" }}>
                  <p style={{ color: "#94a3b8", fontSize: "0.85rem", lineHeight: 1.6, marginTop: 14, marginBottom: 14 }}>{stage.description}</p>
                  <div style={{ marginBottom: 14 }}>
                    <p style={{ fontSize: "0.7rem", color: "#475569", textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 600, marginBottom: 8 }}>Skills Clave</p>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {stage.skills.map(s => <span key={s} style={{ fontSize: "0.75rem", padding: "3px 10px", borderRadius: 8, background: "rgba(30,41,59,0.8)", color: "#94a3b8", border: "1px solid #334155" }}>{s}</span>)}
                    </div>
                  </div>
                  <div>
                    <p style={{ fontSize: "0.7rem", color: "#475569", textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 600, marginBottom: 8 }}>📖 Teoría Esencial</p>
                    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>

                          <div key={idx} style={{ borderRadius: 8, border: "1px solid #1e293b", overflow: "hidden" }}>
                            <button style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 12px", background: "transparent", cursor: "pointer", textAlign: "left" }} onClick={() => setExpandedTheory(expandedTheory === key ? null : key)}>
                              <span style={{ fontSize: "0.82rem", fontWeight: 500, color: "#818cf8" }}>{t.title}</span>

                    {isDone ? "✓ Marcar como pendiente" : "Marcar como completado ✓"}
                  </button>
                </div>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function QuizView({ onScore }) {
  const [selectedModule, setSelectedModule] = useState("mindset");
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [sessionScore, setSessionScore] = useState(0);
  const [finished, setFinished] = useState(false);

  const questions = QUIZ_DATA[selectedModule];
  const q = questions[current];

  const handleSelect = (idx) => {
    if (answered) return;
    setSelected(idx);
    setAnswered(true);
    if (idx === q.correct) setSessionScore(s => s + 1);
  };

  const handleNext = () => {
    if (current < questions.length - 1) {
      setCurrent(c => c + 1); setSelected(null); setAnswered(false);
    } else {
      onScore(selectedModule, sessionScore + (selected === q.correct ? 1 : 0));
      setFinished(true);
    }
  };

  const handleRestart = () => { setCurrent(0); setSelected(null); setAnswered(false); setSessionScore(0); setFinished(false); };
  const handleModuleChange = (mod) => { setSelectedModule(mod); setCurrent(0); setSelected(null); setAnswered(false); setSessionScore(0); setFinished(false); };

  const moduleLabels = { mindset: "🧠 Fundamentos", programming: "💻 Programación", git: "🌿 Git", "web-frameworks": "🌐 Web Testing", "api-testing": "🔌 API Testing", cicd: "⚙️ CI/CD", reporting: "📊 Reporting" };

  return (
    <div style={{ maxWidth: 700, margin: "0 auto" }}>
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ fontFamily: "var(--font-display)", fontSize: "1.4rem", fontWeight: 700, color: "#fff", marginBottom: 4 }}>🎯 Quiz por Módulo</h2>
        <p style={{ color: "#94a3b8", fontSize: "0.85rem" }}>Pon a prueba tu conocimiento con preguntas interactivas</p>
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 20 }}>
        {Object.entries(moduleLabels).map(([key, label]) => (
          <button key={key} onClick={() => handleModuleChange(key)}
            style={{ padding: "6px 12px", borderRadius: 8, fontSize: "0.75rem", fontWeight: 500, cursor: "pointer", border: "1px solid", transition: "all 0.15s", borderColor: selectedModule === key ? "#6366f1" : "#1e293b", background: selectedModule === key ? "#312e81" : "rgba(15,23,42,0.6)", color: selectedModule === key ? "#a5b4fc" : "#64748b" }}>
            {label}
          </button>
        ))}
      </div>

      {finished ? (
        <div style={{ borderRadius: 16, border: "1px solid #1e293b", background: "rgba(15,23,42,0.8)", padding: 40, textAlign: "center" }}>
          <div style={{ fontSize: "3rem", marginBottom: 12 }}>{sessionScore >= 4 ? "🏆" : sessionScore >= 3 ? "🎯" : "💪"}</div>
          <h3 style={{ fontFamily: "var(--font-display)", fontSize: "1.5rem", color: "#fff", marginBottom: 8 }}>{sessionScore >= 4 ? "¡Excelente!" : sessionScore >= 3 ? "¡Bien hecho!" : "Sigue practicando"}</h3>
          <p style={{ color: "#94a3b8", marginBottom: 6 }}>Obtuviste <span style={{ color: "#818cf8", fontWeight: 700, fontSize: "1.2rem" }}>{sessionScore}/{questions.length}</span> respuestas correctas</p>
          <p style={{ color: "#64748b", fontSize: "0.85rem", marginBottom: 24 }}>{sessionScore >= 4 ? "¡Dominas este módulo! Avanza al siguiente." : "Repasa la teoría en el Roadmap y vuelve a intentarlo."}</p>
          <button onClick={handleRestart} style={{ padding: "10px 24px", background: "#4f46e5", color: "#fff", borderRadius: 8, fontWeight: 600, fontSize: "0.85rem", cursor: "pointer", border: "none" }}>Reintentar Quiz</button>
        </div>
      ) : (
        <div style={{ borderRadius: 16, border: "1px solid #1e293b", background: "rgba(15,23,42,0.8)", overflow: "hidden" }}>
          <div style={{ padding: "14px 20px", borderBottom: "1px solid #1e293b", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ color: "#64748b", fontSize: "0.8rem", fontFamily: "var(--font-mono)" }}>Pregunta {current + 1} / {questions.length}</span>
            <div style={{ display: "flex", gap: 4 }}>{questions.map((_, i) => <div key={i} style={{ width: 8, height: 8, borderRadius: "50%", background: i < current ? "#10b981" : i === current ? "#6366f1" : "#1e293b" }} />)}</div>
            <span style={{ color: "#818cf8", fontSize: "0.8rem", fontFamily: "var(--font-mono)", fontWeight: 600 }}>Score: {sessionScore}</span>
          </div>
          <div style={{ padding: 24 }}>
            <p style={{ color: "#f1f5f9", fontWeight: 500, fontSize: "0.95rem", lineHeight: 1.6, marginBottom: 20 }}>{q.q}</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {q.opts.map((opt, i) => {
                let bg = "rgba(30,41,59,0.5)", border = "#334155", color = "#cbd5e1", cursor = "pointer";
                if (answered) {
                  if (i === q.correct) { bg = "rgba(16,185,129,0.1)"; border = "#10b981"; color = "#6ee7b7"; cursor = "default"; }
                  else if (i === selected) { bg = "rgba(239,68,68,0.1)"; border = "#ef4444"; color = "#fca5a5"; cursor = "default"; }
                  else { bg = "rgba(15,23,42,0.3)"; border = "#1e293b"; color = "#475569"; cursor = "default"; }
                } else if (selected === i) { bg = "rgba(99,102,241,0.15)"; border = "#6366f1"; }
                return (
                  <button key={i} onClick={() => handleSelect(i)}
                    style={{ textAlign: "left", padding: "12px 16px", borderRadius: 10, border: `1px solid ${border}`, background: bg, cursor, transition: "all 0.15s", display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ width: 24, height: 24, borderRadius: "50%", border: `1px solid ${border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "0.7rem", flexShrink: 0, fontFamily: "var(--font-mono)", color }}>
                      {answered && i === q.correct ? <Check size={11} /> : answered && i === selected && i !== q.correct ? <X size={11} /> : String.fromCharCode(65 + i)}
                    </span>
                    <span style={{ fontSize: "0.85rem", color, lineHeight: 1.5 }}>{opt}</span>
                  </button>
                );
              })}
            </div>
            {answered && (
              <div style={{ marginTop: 16, padding: "14px 16px", borderRadius: 10, fontSize: "0.85rem", lineHeight: 1.55, border: `1px solid ${selected === q.correct ? "rgba(16,185,129,0.3)" : "rgba(239,68,68,0.3)"}`, background: selected === q.correct ? "rgba(16,185,129,0.08)" : "rgba(239,68,68,0.08)", color: selected === q.correct ? "#6ee7b7" : "#fca5a5" }}>
                <strong>{selected === q.correct ? "✅ ¡Correcto! " : "❌ Incorrecto. "}</strong>{q.explanation}
              </div>
            )}
          </div>
          {answered && (
            <div style={{ padding: "0 24px 24px" }}>
              <button onClick={handleNext} style={{ width: "100%", padding: 12, background: "#4f46e5", color: "#fff", borderRadius: 10, fontWeight: 600, fontSize: "0.85rem", cursor: "pointer", border: "none" }}>
                {current < questions.length - 1 ? "Siguiente pregunta →" : "Ver resultado final"}
              </button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function GlossaryView() {
  const [expanded, setExpanded] = useState(null);
  const [search, setSearch] = useState("");
  const filtered = GLOSSARY.filter(g => g.term.toLowerCase().includes(search.toLowerCase()) || g.def.toLowerCase().includes(search.toLowerCase()));
  return (
    <div style={{ maxWidth: 700, margin: "0 auto" }}>
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ fontFamily: "var(--font-display)", fontSize: "1.4rem", fontWeight: 700, color: "#fff", marginBottom: 4 }}>📖 Glosario QA Automation</h2>
        <p style={{ color: "#94a3b8", fontSize: "0.85rem" }}>{GLOSSARY.length} términos esenciales que todo QA Automatizador debe conocer</p>
      </div>
      <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar término..." style={{ width: "100%", padding: "10px 16px", background: "rgba(15,23,42,0.8)", border: "1px solid #1e293b", borderRadius: 10, fontSize: "0.85rem", color: "#fff", outline: "none", marginBottom: 16, boxSizing: "border-box" }} />
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {filtered.map((g, i) => (
          <div key={i} style={{ borderRadius: 10, border: "1px solid #1e293b", background: "rgba(15,23,42,0.6)", overflow: "hidden" }}>
            <button style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", cursor: "pointer", background: "transparent", textAlign: "left" }} onClick={() => setExpanded(expanded === i ? null : i)}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#6366f1", flexShrink: 0 }} />
                <span style={{ fontWeight: 600, color: "#e2e8f0", fontSize: "0.875rem" }}>{g.term}</span>
              </div>
              {expanded === i ? <ChevronDown size={14} color="#64748b" /> : <ChevronRight size={14} color="#64748b" />}
            </button>
            {expanded === i && <div style={{ padding: "0 16px 14px", fontSize: "0.82rem", color: "#94a3b8", lineHeight: 1.65, borderTop: "1px solid #1e293b", paddingTop: 12, background: "rgba(15,23,42,0.3)" }}>{g.def}</div>}
          </div>
        ))}
        {filtered.length === 0 && <p style={{ textAlign: "center", color: "#475569", padding: 32 }}>No se encontraron términos para "{search}"</p>}
      </div>
    </div>
  );
}

function ChallengesView({ solved, onSolve }) {
  const [active, setActive] = useState(null);
  const [picked, setPicked] = useState({});
  const [revealed, setRevealed] = useState({});

  const handleReveal = (chalId) => {
    setRevealed(r => ({ ...r, [chalId]: true }));
    const chal = CODE_CHALLENGES.find(c => c.id === chalId);
    const correct = chal.options.findIndex(o => o.correct);
    if (picked[chalId] === correct) onSolve(chalId);
  };

  return (
    <div style={{ maxWidth: 800, margin: "0 auto" }}>
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ fontFamily: "var(--font-display)", fontSize: "1.4rem", fontWeight: 700, color: "#fff", marginBottom: 4 }}>⚡ Mini Retos de Código</h2>
        <p style={{ color: "#94a3b8", fontSize: "0.85rem" }}>Ejercicios prácticos para consolidar tu conocimiento</p>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 10, marginBottom: 20 }}>
        {CODE_CHALLENGES.map(c => (
          <button key={c.id} onClick={() => setActive(active === c.id ? null : c.id)}
            style={{ padding: 14, borderRadius: 12, border: `1px solid ${active === c.id ? "#6366f1" : solved[c.id] ? "#065f46" : "#1e293b"}`, background: active === c.id ? "rgba(99,102,241,0.1)" : solved[c.id] ? "rgba(16,185,129,0.05)" : "rgba(15,23,42,0.6)", cursor: "pointer", textAlign: "left", transition: "all 0.15s" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
              <span style={{ fontSize: "0.7rem", padding: "2px 8px", borderRadius: 999, background: c.difficulty === "Básico" ? "rgba(16,185,129,0.15)" : "rgba(245,158,11,0.15)", color: c.difficulty === "Básico" ? "#6ee7b7" : "#fcd34d", border: `1px solid ${c.difficulty === "Básico" ? "rgba(16,185,129,0.3)" : "rgba(245,158,11,0.3)"}` }}>{c.difficulty}</span>
              {solved[c.id] && <span style={{ color: "#10b981", fontSize: "0.75rem" }}>✓</span>}
            </div>
            <p style={{ color: "#e2e8f0", fontSize: "0.8rem", fontWeight: 500, lineHeight: 1.4, marginBottom: 4 }}>{c.title}</p>
            <p style={{ color: "#475569", fontSize: "0.7rem", fontFamily: "var(--font-mono)" }}>{c.language}</p>
          </button>
        ))}
      </div>

      {active && (() => {
        const chal = CODE_CHALLENGES.find(c => c.id === active);
        return (
          <div style={{ borderRadius: 16, border: "1px solid #1e293b", background: "rgba(15,23,42,0.8)", overflow: "hidden" }}>
            <div style={{ padding: "16px 20px", borderBottom: "1px solid #1e293b", display: "flex", alignItems: "flex-start", justifyContent: "space-between" }}>
              <div>
                <h3 style={{ color: "#fff", fontWeight: 700, fontSize: "1rem", marginBottom: 6 }}>{chal.title}</h3>
                <div style={{ display: "flex", gap: 6 }}>
                  <span style={{ fontSize: "0.7rem", padding: "2px 8px", borderRadius: 999, background: "rgba(139,92,246,0.15)", color: "#c4b5fd", border: "1px solid rgba(139,92,246,0.3)" }}>{chal.language}</span>
                </div>
              </div>
              {solved[chal.id] && <span style={{ color: "#10b981", fontSize: "0.85rem", fontWeight: 600 }}>✅ Resuelto</span>}
            </div>
            <div style={{ padding: 20 }}>
              <p style={{ color: "#94a3b8", fontSize: "0.85rem", marginBottom: 16 }}>{chal.description}</p>
              {(chal.html || chal.code) && (
                <div style={{ borderRadius: 10, background: "#020617", border: "1px solid #1e293b", padding: 16, marginBottom: 16 }}>
                  <p style={{ fontSize: "0.7rem", color: "#475569", marginBottom: 8, fontFamily: "var(--font-mono)", textTransform: "uppercase" }}>{chal.html ? "HTML de referencia" : "Código a analizar"}</p>
                  <pre style={{ fontSize: "0.78rem", color: "#e2e8f0", fontFamily: "var(--font-mono)", margin: 0, overflow: "auto", whiteSpace: "pre-wrap", lineHeight: 1.6 }}>{chal.html || chal.code}</pre>
                </div>
              )}
              <p style={{ fontSize: "0.85rem", fontWeight: 600, color: "#cbd5e1", marginBottom: 12 }}>¿Cuál es la respuesta correcta?</p>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {chal.options.map((opt, i) => {
                  let bg = "rgba(30,41,59,0.5)", border = "#334155", cursor = "pointer";
                  if (revealed[chal.id]) {
                    if (opt.correct) { bg = "rgba(16,185,129,0.1)"; border = "#10b981"; cursor = "default"; }
                    else if (picked[chal.id] === i) { bg = "rgba(239,68,68,0.1)"; border = "#ef4444"; cursor = "default"; }
                    else { bg = "transparent"; border = "#1e293b"; cursor = "default"; }
                  } else if (picked[chal.id] === i) { bg = "rgba(99,102,241,0.15)"; border = "#6366f1"; }
                  return (
                    <div key={i} onClick={() => !revealed[chal.id] && setPicked(p => ({ ...p, [chal.id]: i }))}
                      style={{ padding: 16, borderRadius: 10, border: `1px solid ${border}`, background: bg, cursor, transition: "all 0.15s" }}>
                      <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                        <div style={{ width: 18, height: 18, borderRadius: "50%", border: `2px solid ${picked[chal.id] === i && !revealed[chal.id] ? "#6366f1" : border}`, background: picked[chal.id] === i && !revealed[chal.id] ? "#6366f1" : "transparent", flexShrink: 0, marginTop: 2 }} />
                        <div style={{ flex: 1 }}>
                          <p style={{ fontSize: "0.75rem", color: "#64748b", fontWeight: 600, marginBottom: 4 }}>{opt.label}</p>
                          <pre style={{ fontSize: "0.75rem", color: "#94a3b8", fontFamily: "var(--font-mono)", margin: 0, whiteSpace: "pre-wrap", lineHeight: 1.55 }}>{opt.code}</pre>
                          {revealed[chal.id] && <p style={{ fontSize: "0.8rem", marginTop: 8, color: opt.correct ? "#6ee7b7" : "#fca5a5", lineHeight: 1.55 }}>{opt.explanation}</p>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
              {picked[chal.id] !== undefined && !revealed[chal.id] && (
                <button onClick={() => handleReveal(chal.id)} style={{ marginTop: 14, width: "100%", padding: 12, background: "#7c3aed", color: "#fff", borderRadius: 10, fontWeight: 600, fontSize: "0.85rem", cursor: "pointer", border: "none" }}>Revelar respuesta</button>
              )}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function ChecklistView({ checked, onToggle }) {
  const total = CHECKLIST_ITEMS.length;
  const done = Object.values(checked).filter(Boolean).length;
  const pct = (done / total) * 100;
  const categories = [...new Set(CHECKLIST_ITEMS.map(i => i.category))];
  const progressColor = pct >= 80 ? "#10b981" : pct >= 50 ? "#f59e0b" : "#6366f1";

  return (
    <div style={{ maxWidth: 700, margin: "0 auto" }}>
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ fontFamily: "var(--font-display)", fontSize: "1.4rem", fontWeight: 700, color: "#fff", marginBottom: 4 }}>✅ Checklist de Transición</h2>
        <p style={{ color: "#94a3b8", fontSize: "0.85rem" }}>Las {total} habilidades que debes dominar para llamarte QA Automatizador</p>
      </div>
      <div style={{ borderRadius: 14, border: "1px solid #1e293b", background: "rgba(15,23,42,0.8)", padding: 20, marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <span style={{ color: "#e2e8f0", fontWeight: 600 }}>Progreso general</span>
          <span style={{ fontFamily: "var(--font-mono)", fontSize: "1.8rem", fontWeight: 700, color: progressColor }}>{Math.round(pct)}%</span>
        </div>
        <div style={{ height: 8, background: "#0f172a", borderRadius: 999, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${pct}%`, background: `linear-gradient(90deg, #6366f1, ${progressColor})`, borderRadius: 999, transition: "width 0.5s ease" }} />
        </div>
        <p style={{ color: "#475569", fontSize: "0.8rem", marginTop: 8 }}>{done} de {total} habilidades completadas</p>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {categories.map(cat => {
          const items = CHECKLIST_ITEMS.filter(i => i.category === cat);
          const catDone = items.filter(i => checked[i.id]).length;
          return (
            <div key={cat} style={{ borderRadius: 12, border: "1px solid #1e293b", background: "rgba(15,23,42,0.6)", overflow: "hidden" }}>
              <div style={{ padding: "12px 16px", borderBottom: "1px solid #1e293b", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontWeight: 600, color: "#e2e8f0", fontSize: "0.875rem" }}>{cat}</span>
                <span style={{ fontSize: "0.75rem", fontFamily: "var(--font-mono)", color: catDone === items.length ? "#10b981" : "#64748b" }}>{catDone}/{items.length}</span>
              </div>
              <div>
                {items.map((item, idx) => (
                  <div key={item.id} onClick={() => onToggle(item.id)}
                    style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "12px 16px", cursor: "pointer", borderBottom: idx < items.length - 1 ? "1px solid #0f172a" : "none", transition: "background 0.1s" }}>
                    <div style={{ width: 20, height: 20, borderRadius: 5, border: `2px solid ${checked[item.id] ? "#10b981" : "#334155"}`, background: checked[item.id] ? "#10b981" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1, transition: "all 0.15s" }}>
                      {checked[item.id] && <Check size={11} color="#fff" />}
                    </div>
                    <p style={{ fontSize: "0.85rem", lineHeight: 1.55, color: checked[item.id] ? "#475569" : "#cbd5e1", textDecoration: checked[item.id] ? "line-through" : "none" }}>{item.text}</p>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
export default function App() {
  const [activeTab, setActiveTab] = useState("roadmap");
  const [stagesCompleted, setStagesCompleted] = useState({});
  const [checklistDone, setChecklistDone] = useState({});
  const [challengesSolved, setChallengesSolved] = useState({});
  const [quizScores, setQuizScores] = useState({});
  const [celebration, setCelebration] = useState(null);

  const totalProgress = (() => {
    const r = (Object.values(stagesCompleted).filter(Boolean).length / ROADMAP_STAGES.length) * 30;
    const c = (Object.values(checklistDone).filter(Boolean).length / CHECKLIST_ITEMS.length) * 40;
    const ch = (Object.values(challengesSolved).filter(Boolean).length / CODE_CHALLENGES.length) * 15;
    const q = (Object.keys(quizScores).length / Object.keys(QUIZ_DATA).length) * 15;
    return r + c + ch + q;
  })();

  const tipLevel = totalProgress < 30 ? "low" : totalProgress < 70 ? "mid" : "high";
  const currentTip = TIPS[tipLevel][0];

  const toast = (msg) => { setCelebration(msg); setTimeout(() => setCelebration(null), 3000); };
  const toggleStage = (id) => { const was = stagesCompleted[id]; setStagesCompleted(s => ({ ...s, [id]: !s[id] })); if (!was) { const st = ROADMAP_STAGES.find(s => s.id === id); toast(`¡Completaste "${st.title}"! 🎉`); } };
  const toggleChecklist = (id) => setChecklistDone(s => ({ ...s, [id]: !s[id] }));
  const solveChallenge = (id) => { setChallengesSolved(s => ({ ...s, [id]: true })); toast("¡Reto superado! ⚡"); };
  const handleQuizScore = (mod, score) => setQuizScores(s => ({ ...s, [mod]: Math.max(s[mod] || 0, score) }));

  const tabs = [
    { id: "roadmap", label: "Roadmap", icon: Map },
    { id: "quiz", label: "Quiz", icon: HelpCircle },
    { id: "glossary", label: "Glosario", icon: BookOpen },
    { id: "challenges", label: "Retos", icon: Code },
    { id: "checklist", label: "Checklist", icon: List },
  ];

  const progressColor = totalProgress >= 80 ? "#10b981" : totalProgress >= 50 ? "#f59e0b" : "#6366f1";

  return (
    <div style={{ minHeight: "100vh", background: "#020617", color: "#fff", fontFamily: "'DM Sans', system-ui, sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        :root { --font-display: 'Space Grotesk', system-ui; --font-mono: 'JetBrains Mono', monospace; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #020617; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        button { font-family: inherit; }
        input { font-family: inherit; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-12px) translateX(-50%); } to { opacity: 1; transform: translateY(0) translateX(-50%); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
      `}</style>

      {/* Celebration */}
      {celebration && (
        <div style={{ position: "fixed", top: 20, left: "50%", zIndex: 999, padding: "10px 24px", background: "linear-gradient(135deg, #059669, #0d9488)", borderRadius: 999, color: "#fff", fontWeight: 600, fontSize: "0.85rem", boxShadow: "0 8px 32px rgba(16,185,129,0.4)", animation: "slideDown 0.3s ease", whiteSpace: "nowrap" }}>
          {celebration}
        </div>
      )}

      {/* Header */}
      <div style={{ position: "sticky", top: 0, zIndex: 40, borderBottom: "1px solid #0f172a", background: "rgba(2,6,23,0.95)", backdropFilter: "blur(12px)" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 16px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 16, padding: "12px 0" }}>
            {/* Logo */}
            <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
              <div style={{ width: 34, height: 34, borderRadius: 10, background: "linear-gradient(135deg, #6366f1, #7c3aed)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <Zap size={16} color="#fff" />
              </div>
              <div style={{ display: "none" }} className="sm-show">
                <p style={{ fontFamily: "var(--font-display)", fontSize: "0.85rem", fontWeight: 700, color: "#fff", lineHeight: 1.2 }}>QA Path</p>
                <p style={{ fontSize: "0.7rem", color: "#475569", lineHeight: 1.2 }}>Funcional → Automatizador</p>
              </div>
            </div>

            {/* Progress */}
            <div style={{ flex: 1, maxWidth: 320 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ flex: 1, height: 6, background: "#0f172a", borderRadius: 999, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${totalProgress}%`, background: `linear-gradient(90deg, #6366f1, #7c3aed, ${progressColor})`, borderRadius: 999, transition: "width 0.7s ease" }} />
                </div>
                <span style={{ fontSize: "0.75rem", fontFamily: "var(--font-mono)", color: progressColor, flexShrink: 0, fontWeight: 600 }}>{Math.round(totalProgress)}%</span>
              </div>
            </div>

            {/* Tip */}
            <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: "0.75rem", color: "#64748b", background: "rgba(15,23,42,0.8)", padding: "6px 12px", borderRadius: 8, border: "1px solid #1e293b", maxWidth: 280, overflow: "hidden" }}>
              <span style={{ flexShrink: 0 }}>💡</span>
              <span style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{currentTip}</span>
            </div>
          </div>

          {/* Tabs */}
          <div style={{ display: "flex", gap: 2, overflowX: "auto", paddingBottom: 0 }}>
            {tabs.map(tab => {
              const Icon = tab.icon;
              const active = activeTab === tab.id;
              return (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                  style={{ display: "flex", alignItems: "center", gap: 6, padding: "10px 14px", fontSize: "0.8rem", fontWeight: 500, cursor: "pointer", borderBottom: `2px solid ${active ? "#6366f1" : "transparent"}`, background: "transparent", border: "none", borderBottomWidth: 2, borderBottomStyle: "solid", borderBottomColor: active ? "#6366f1" : "transparent", color: active ? "#818cf8" : "#475569", flexShrink: 0, transition: "all 0.15s" }}>
                  <Icon size={14} />
                  {tab.label}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "32px 16px" }}>
        {activeTab === "roadmap" && <RoadmapView completed={stagesCompleted} onToggle={toggleStage} />}
        {activeTab === "quiz" && <QuizView onScore={handleQuizScore} />}
        {activeTab === "glossary" && <GlossaryView />}
        {activeTab === "challenges" && <ChallengesView solved={challengesSolved} onSolve={solveChallenge} />}
        {activeTab === "checklist" && <ChecklistView checked={checklistDone} onToggle={toggleChecklist} />}
      </div>
    </div>
  );
}


  ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
